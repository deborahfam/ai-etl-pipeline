# FlowAI ETL - LLM Provider Configuration
# -----------------------------------------------------------
# The gateway auto-detects available providers from env vars.
# This file configures model selection and priority.

priority_order:
  - anthropic
  - openai
  - openrouter
  - lmstudio

providers:
  anthropic:
    models:
      default: claude-sonnet-4-20250514
      haiku: claude-haiku-4-5-20251001
      sonnet: claude-sonnet-4-20250514
      opus: claude-opus-4-20250514
    supports_vision: true
    supports_structured_output: true

  openai:
    models:
      default: gpt-4o
      mini: gpt-4o-mini
    supports_vision: true
    supports_structured_output: true

  lmstudio:
    base_url: http://localhost:1234/v1
    models:
      default: local-model
    supports_vision: false
    supports_structured_output: true

  openrouter:
    base_url: https://openrouter.ai/api/v1
    models:
      default: anthropic/claude-sonnet-4-20250514
    supports_vision: true
    supports_structured_output: true
